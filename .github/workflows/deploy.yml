name: Deploy

on:
  push:
    branches: [main, staging, production]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # Resolve environment name from branch
  # -------------------------------------------------------------------

  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "environment=dev" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "environment=staging" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "environment=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported deploy branch: ${{ github.ref_name }}" >&2
              exit 1
              ;;
          esac

  # -------------------------------------------------------------------
  # STAGE 1: Run database migrations
  # -------------------------------------------------------------------

  migrate:
    needs: [resolve-env]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade uv
          uv sync
      - name: Run migrations
        working-directory: backend
        env:
          POSTGRESQL_DSN: ${{ secrets.POSTGRESQL_DSN }}
        run: uv run alembic upgrade head

  # -------------------------------------------------------------------
  # STAGE 2: Deploy backend to DO App Platform
  # -------------------------------------------------------------------

  deploy-backend:
    needs: [resolve-env, migrate]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-env.outputs.environment }}
      url: ${{ vars.BACKEND_URL }}
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Trigger deployment
        run: doctl apps create-deployment ${{ vars.DIGITALOCEAN_BACKEND_APP_ID }} --wait

  # -------------------------------------------------------------------
  # STAGE 3: Deploy frontend
  # -------------------------------------------------------------------

  deploy-frontend:
    needs: [resolve-env, deploy-backend]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve-env.outputs.environment }}
      url: ${{ vars.FRONTEND_URL }}
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Trigger deployment
        run: doctl apps create-deployment ${{ vars.DIGITALOCEAN_FRONTEND_APP_ID }} --wait
