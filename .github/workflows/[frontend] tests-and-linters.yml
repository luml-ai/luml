name: Frontend Tests and Linters

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Prettier check
        working-directory: frontend
        run: npm run format:check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install Linux Rollup binding
        run: npm install @rollup/rollup-linux-x64-gnu --workspace=frontend

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:ci

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install Linux Rollup binding
        run: npm install @rollup/rollup-linux-x64-gnu --workspace=frontend

      - name: Get Playwright version
        id: pw-version
        working-directory: frontend
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Build workspace packages
        run: |
          npm run build-only --workspace=@luml/attachments
          npm run build-only --workspace=@luml/experiments

      - name: Build frontend
        working-directory: frontend
        run: npm run build-only

      - name: Run integration tests
        working-directory: frontend
        run: npm run test:integration
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7