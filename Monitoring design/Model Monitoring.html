PH-(v/PMAX)*PH).toFixed(1)).join(' L')+' L'+PW+','+PH+' Z';\n    const psiThreshY = (PH-(0.2/PMAX)*PH).toFixed(1);\n    const driftDash = '25 75';\n    const stFor = (psi)=> psi>=0.2 ? 'Drifted' : psi>=0.1 ? 'Watch' : 'Stable';\n    const fStatus = (st)=> st==='Drifted' ? {badgeBg:'#fee2e2',badgeFg:'#dc2626',psiFg:'#dc2626',barColor:'#ea7317',dot:'#ef4444'}\n      : st==='Watch' ? {badgeBg:'#fef9c3',badgeFg:'#a16207',psiFg:'#a16207',barColor:'#eab308',dot:'#eab308'}\n      : {badgeBg:'#dcfce7',badgeFg:'#16a34a',psiFg:'#475569',barColor:'#2673fd',dot:'#16a34a'};\n\n    // Feature reference profiles — computed at training (see attached training-summary JSON)\n    const FEATS = [\n      { name:'age', dtype:'numerical', unit:'yrs', psi:0.31,\n        bins:['18–25','25–35','35–45','45–55','55–65','65–75'],\n        ref:[0.05,0.15,0.40,0.25,0.10,0.05], cur:[0.03,0.10,0.30,0.30,0.17,0.10],\n        sum:{ mean:35.2, std:12.5, min:18, max:75, q05:20, q25:25, q50:34, q75:45, q95:65, count:100, missing:0 },\n        curSum:{ mean:41.8, std:13.9, q25:31, q50:42, q75:53 },\n        edges:'[18, 25, 35, 45, 55, 65, 75]' },\n      { name:'income', dtype:'numerical', unit:'$', psi:0.22,\n        bins:['20–40k','40–60k','60–80k','80–100k','100–120k'],\n        ref:[0.10,0.30,0.35,0.15,0.10], cur:[0.06,0.22,0.34,0.22,0.16],\n        sum:{ mean:52000, std:15000, min:20000, max:120000, q05:25000, q25:40000, q50:50000, q75:65000, q95:100000, count:100, missing:0 },\n        curSum:{ mean:61200, std:16800, q25:46000, q50:58000, q75:76000 },\n        edges:'[20k, 40k, 60k, 80k, 100k, 120k]' },\n      { name:'region', dtype:'categorical', unit:'', psi:0.12,\n        bins:['north','south','east','west'],\n        ref:[0.25,0.25,0.25,0.25], cur:[0.30,0.20,0.28,0.22],\n        sum:{ nUnique:4, count:100, missing:0 } },\n      { name:'gender', dtype:'categorical', unit:'', psi:0.03,\n        bins:['male','female','other'],\n        ref:[0.45,0.50,0.05], cur:[0.48,0.47,0.05],\n        sum:{ nUnique:3, count:100, missing:0 } },\n      { name:'account_balance', dtype:'numerical', unit:'$', psi:0.08,\n        bins:['0–2k','2–5k','5–10k','10–20k','20k+'],\n        ref:[0.30,0.32,0.22,0.11,0.05], cur:[0.28,0.33,0.23,0.11,0.05],\n        sum:{ mean:6400, std:5200, min:0, max:48000, q05:300, q25:1900, q50:4800, q75:9200, q95:18500, count:100, missing:2 },\n        curSum:{ mean:6610, std:5300, q25:2000, q50:5000, q75:9400 },\n        edges:'[0, 2k, 5k, 10k, 20k, 48k]' },\n      { name:'num_products', dtype:'numerical', unit:'', psi:0.05,\n        bins:['1','2','3','4+'],\n        ref:[0.52,0.34,0.11,0.03], cur:[0.50,0.35,0.12,0.03],\n        sum:{ mean:1.66, std:0.78, min:1, max:5, q05:1, q25:1, q50:2, q75:2, q95:3, count:100, missing:0 },\n        curSum:{ mean:1.69, std:0.79, q25:1, q50:2, q75:2 },\n        edges:'[1, 2, 3, 4, 5]' },\n      { name:'channel', dtype:'categorical', unit:'', psi:0.06,\n        bins:['web','mobile','branch','partner'],\n        ref:[0.40,0.34,0.18,0.08], cur:[0.43,0.33,0.16,0.08],\n        sum:{ nUnique:4, count:100, missing:0 } },\n      { name:'is_active', dtype:'categorical', unit:'', psi:0.04,\n        bins:['active','inactive'],\n        ref:[0.72,0.28], cur:[0.70,0.30],\n        sum:{ nUnique:2, count:100, missing:0 } },\n    ];\n\n    // overview drift table (compact ref/cur sparkbars)\n    const featureDrift = FEATS.map(f=>{\n      const st = stFor(f.psi), mx = Math.max(...f.ref, ...f.cur) || 1;\n      return { name:f.name, dtype:f.dtype, psi:f.psi.toFixed(2), status:st, ...fStatus(st),\n        dist: f.ref.map((r,i)=>({ ref: Math.round(r/mx*100)+'%', cur: Math.round(f.cur[i]/mx*100)+'%' })) };\n    });\n    const topDrift = [...featureDrift].sort((a,b)=>parseFloat(b.psi)-parseFloat(a.psi)).slice(0,3);\n\n    // feature selector chips\n    const featChips = FEATS.map(f=>{ const st=stFor(f.psi), seld=s.selFeature===f.name;\n      return { name:f.name, on:()=>this.setState({selFeature:f.name}), dot:fStatus(st).dot,\n        style:`display:inline-flex;align-items:center;gap:7px;border:1px solid ${seld?'#2673fd':'#e2e8f0'};background:${seld?'#eff6ff':'#fff'};color:${seld?'#2673fd':'#475569'};font-weight:${seld?'600':'500'};font-size:13px;font-family:inherit;padding:7px 13px;border-radius:8px;cursor:pointer` }; });\n\n    // selected feature deep-dive\n    const fSel = FEATS.find(f=>f.name===s.selFeature) || FEATS[0];\n    const fStat = stFor(fSel.psi), fStyle = fStatus(fStat);\n    const dmax = Math.max(...fSel.ref, ...fSel.cur) || 1;\n    const distBars = fSel.bins.map((label,i)=>({ label, ref:Math.round(fSel.ref[i]/dmax*100)+'%', cur:Math.round(fSel.cur[i]/dmax*100)+'%',\n      refPct:(fSel.ref[i]*100).toFixed(0)+'%', curPct:(fSel.cur[i]*100).toFixed(0)+'%' }));\n    // per-feature PSI over time (ramps toward its psi)\n    const fpsiSeed = Array.from({length:14}, (_,i)=> +(fSel.psi*(0.45+0.55*i/13)*(0.92+0.16*Math.sin(i*1.3))).toFixed(3));\n    const FW=320, FH=120, FMAX=Math.max(0.4, fSel.psi*1.3);\n    const fpsiLine = fpsiSeed.map((v,i)=>(i*(FW/(fpsiSeed.length-1))).toFixed(1)+','+(FH-(v/FMAX)*FH).toFixed(1)).join(' ');\n    const fpsiArea = 'M0,'+FH+' L'+fpsiSeed.map((v,i)=>(i*(FW/(fpsiSeed.length-1))).toFixed(1)+','+(FH-(v/FMAX)*FH).toFixed(1)).join(' L')+' L'+FW+','+FH+' Z';\n    const fThreshY = (FH-(0.2/FMAX)*FH).toFixed(1);\n    // stats comparison rows\n    const fmtV = (v)=> fSel.unit==='$' ? '$'+(v>=1000?(v/1000)+'k':v) : (fSel.unit==='yrs'? v : v);\n    let statRows;\n    if (fSel.dtype==='numerical'){\n      const rows = [['Mean','mean'],['Std dev','std'],['25th pct','q25'],['Median','q50'],['75th pct','q75']];\n      statRows = rows.map(([label,k])=>{ const r=fSel.sum[k], c=fSel.curSum[k]!=null?fSel.curSum[k]:fSel.sum[k];\n        const delta = c!==r ? ((c>r?'+':'')+(fSel.unit==='$'? '$'+Math.round((c-r)/1000)+'k' : (Math.round((c-r)*10)/10))) : '—';\n        return { label, ref:fmtV(r), cur:fmtV(c), delta, deltaFg: c>r?'#dc2626':(c<r?'#2673fd':'#94a3b8') }; });\n    } else {\n      statRows = fSel.bins.map((b,i)=>({ label:b, ref:(fSel.ref[i]*100).toFixed(0)+'%', cur:(fSel.cur[i]*100).toFixed(0)+'%',\n        delta:((fSel.cur[i]-fSel.ref[i])>=0?'+':'')+((fSel.cur[i]-fSel.ref[i])*100).toFixed(0)+'pp',\n        deltaFg: fSel.cur[i]>fSel.ref[i]?'#dc2626':(fSel.cur[i]<fSel.ref[i]?'#2673fd':'#94a3b8') }));\n    }\n    // info-drawer reference-profile rows\n    let infoRows;\n    if (fSel.dtype==='numerical'){\n      infoRows = [['Mean',fmtV(fSel.sum.mean)],['Std dev',fmtV(fSel.sum.std)],['Min',fmtV(fSel.sum.min)],['Max',fmtV(fSel.sum.max)],\n        ['q05',fmtV(fSel.sum.q05)],['q25',fmtV(fSel.sum.q25)],['q50 (median)',fmtV(fSel.sum.q50)],['q75',fmtV(fSel.sum.q75)],['q95',fmtV(fSel.sum.q95)],\n        ['Count',fSel.sum.count],['Missing',fSel.sum.missing]].map(([k,v])=>({k,v:String(v)}));\n    } else {\n      infoRows = [['Unique categories',fSel.sum.nUnique],['Count',fSel.sum.count],['Missing',fSel.sum.missing]].map(([k,v])=>({k,v:String(v)}))\n        .concat(fSel.bins.map((b,i)=>({k:'P('+b+')', v:fSel.ref[i].toFixed(2)})));\n    }\n    const infoCats = fSel.dtype==='categorical' ? fSel.bins.map((b,i)=>({ name:b, p:(fSel.ref[i]*100).toFixed(0)+'%' })) : [];\n    const fSelMeta = { name:fSel.name, dtype:fSel.dtype, psi:fSel.psi.toFixed(2), status:fStat,\n      badgeBg:fStyle.badgeBg, badgeFg:fStyle.badgeFg, barColor:fStyle.barColor, psiFg:fStyle.psiFg,\n      isNumeric:fSel.dtype==='numerical', isCategorical:fSel.dtype==='categorical', edges:fSel.edges||'',\n      openInfo:()=>this.setState({infoOpen:true}) };\n\n    // ---- multivariate (PCA) drift ----\n    const pcaRefPts = [[0,0],[1,0.5],[-1,-0.4],[0.6,1.1],[-0.8,0.7],[0.3,-0.9],[1.4,0.3],[-1.3,0.2],[0.2,0.6],[-0.4,-1.0],[0.9,-0.5],[-0.6,1.2]];\n    const pcaCurPts = [[1.6,0.9],[2.2,1.4],[1.1,0.4],[2.6,1.9],[1.9,0.6],[2.9,1.2],[1.4,1.7],[2.3,0.3],[3.1,1.5],[1.7,1.1],[2.5,0.8],[2.0,1.9]];\n    const PCX=(x)=> (160 + x*38).toFixed(1), PCY=(y)=> (95 - y*38).toFixed(1);\n    const pcaRef = pcaRefPts.map(([x,y])=>({ cx:PCX(x), cy:PCY(y) }));\n    const pcaCur = pcaCurPts.map(([x,y])=>({ cx:PCX(x), cy:PCY(y) }));\n    const predStats = [\n      { label:'Prediction PSI', value:'0.12' },\n      { label:'Mean churn prob', value:'0.27' },\n      { label:'Positive rate', value:'23.4%' },\n      { label:'Ref positive rate', value:'21.1%' },\n    ];\n    const predDist = [\n      { label:'0\\u2013.2', ref:90, cur:78 },\n      { label:'.2\\u2013.4', ref:55, cur:62 },\n      { label:'.4\\u2013.6', ref:32, cur:40 },\n      { label:'.6\\u2013.8', ref:18, cur:26 },\n      { label:'.8\\u20131', ref:10, cur:16 },\n    ].map(b=>({ label:b.label, ref:b.ref+'%', cur:b.cur+'%' }));\n    const predPsiSeed=[0.05,0.06,0.06,0.07,0.08,0.07,0.09,0.08,0.10,0.09,0.11,0.10,0.12,0.12];\n    const predPsiLine = predPsiSeed.map((v,i)=>(i*(PW/(predPsiSeed.length-1))).toFixed(1)+','+(90-(v/PMAX)*90).toFixed(1)).join(' ');\n    const predPsiArea = 'M0,90 L'+predPsiSeed.map((v,i)=>(i*(PW/(predPsiSeed.length-1))).toFixed(1)+','+(90-(v/PMAX)*90).toFixed(1)).join(' L')+' L'+PW+',90 Z';\n    const qualityStats = [\n      { label:'Rows scored', value:'48,500' },\n      { label:'Missing values', value:'0.8%' },\n      { label:'Out-of-range', value:'0.3%' },\n      { label:'Schema match', value:'100%' },\n    ];\n    const qualSeed=[60,52,68,58,74,64,80,70,55,76,66,84,72,88];\n    const qualBars = qualSeed.map(v=>({ h:v+'%' }));\n    const qualityChecksR = [\n      { name:'Schema match', hint:'12 columns \\u00b7 types match reference', status:'Passing', ok:true },\n      { name:'Null rate', hint:'0.8% nulls across monitored features', status:'Passing', ok:true },\n      { name:'Range checks', hint:'monthly_charges: 2 values above expected max', status:'Warning', ok:false },\n      { name:'Duplicate rows', hint:'no duplicate inference keys detected', status:'Passing', ok:true },\n    ].map(c=>({ ...c, badgeBg:c.ok?'#dcfce7':'#fef9c3', badgeFg:c.ok?'#16a34a':'#a16207' }));\n\n    return {\n      // view flags\n      isList, isDeployments: view==='deployments', isMonitoring: view==='monitoring',\n      isDashboard: view==='dashboard', isTrace: view==='trace', isConfig: view==='config',\n      // tabs\n      sectionTabs, dashTabs, timeRanges, configTabs, spanTabs,\n      dashMetrics: curTab==='metrics', dashTraces: curTab==='traces', dashScores: curTab==='scores',\n      dashUsage: curTab==='usage', dashCost: curTab==='cost',\n      driftOverview: curTab==='drift', driftFeatures: curTab==='features',\n      driftPredictions: curTab==='predictions', driftQuality: curTab==='quality',\n      driftStats, psiLine, psiArea, psiThreshY, driftDash, featureDrift, topDrift,\n      predStats, predDist, predPsiLine, predPsiArea, qualityStats, qualBars, qualityChecks: qualityChecksR,\n      goFeatures: ()=>this.setState({dashTab:'features'}),\n      featChips, distBars, fpsiLine, fpsiArea, fThreshY, statRows, fSel: fSelMeta,\n      infoRows, infoCats, infoOpen: s.infoOpen, closeInfo: ()=>this.setState({infoOpen:false}),\n      pcaRef, pcaCur,\n      dateLabel, calCells, calPresets, calOpen: s.calOpen, toggleCal, closeCal, calMonth: MON+' '+YR,\n      cfgScorers: s.configTab==='scorers', cfgPrompt: s.configTab==='prompt', cfgGeneral: s.configTab==='general',\n      spanIO: s.spanTab==='io', spanScores: s.spanTab==='scores', spanMeta: s.spanTab==='meta',\n      // toolbar text\n      searchPlaceholder: view==='monitoring' ? 'Search monitors…' : 'Search deployments…',\n      sortLabel:'Last activity',\n      // data\n      deployments, monitors, mon: { ...mon, isLLM:monIsLLM, isClassic:!monIsLLM,\n        typeBg: monTypeStyle(mon.type).bg, typeFg: monTypeStyle(mon.type).fg,\n        typeIcon: monTypeStyle(mon.type).icon, typeText: monTypeStyle(mon.type).text,\n        statusFg: mon.status==='Active' ? '#16a34a' : '#94a3b8' },\n      stats, volBars, latP50, latP95, latArea, scoreLine, scoreArea, costByModel, cbmLegend,\n      traces, traceTools, fbUserDist, fbAccDist,\n      scoreCards, usageStats, tokenBars, costLinePts, costArea, costDots, costTotalLabel, costByUser,\n      hov: s.hov, hovCbm: s.hov.chart==='cbm', hovCost: s.hov.chart==='cost', hovTok: s.hov.chart==='tok',\n      clearHov: ()=>this.clearHov(),\n      spans, span, trace, scorers, promptText, generalRows,\n      // nav handlers\n      goMonitoring: ()=>this.setState({view:'monitoring'}),\n      goConfig: ()=>this.setState({view:'config', configTab:'scorers'}),\n      backToDash: ()=>this.setState({view:'dashboard'}),\n      // modal\n      connectOpen: s.connectOpen, step1: step===1, step2: step===2, step3: step===3,\n      connectIsLLM: cIsLLM, connectIsClassic: !cIsLLM, steps, judgeOptions, reviewRows,\n      llmCardBorder: sel(cIsLLM), llmCardBg: cIsLLM?'#f5f8ff':'#fff', llmDotBg: cIsLLM?'#2673fd':'transparent', llmDotOp: cIsLLM?'1':'0',\n      classicCardBorder: sel(!cIsLLM), classicCardBg: !cIsLLM?'#f5f8ff':'#fff', classicDotBg: !cIsLLM?'#2673fd':'transparent', classicDotOp: !cIsLLM?'1':'0',\n      backFg: step===1 ? '#cbd5e1' : '#334155',\n      nextLabel: step===3 ? 'Connect monitoring' : 'Continue',\n      openConnect: ()=>this.setState({connectOpen:true, connectStep:1}),\n      closeConnect: ()=>this.setState({connectOpen:false}),\n      stop: (e)=>{ e.stopPropagation(); },\n      pickLLM: ()=>this.setState({connectType:'LLM'}),\n      pickClassic: ()=>this.setState({connectType:'Classic'}),\n      stepBack: ()=>this.setState(st=>({connectStep:Math.max(1,st.connectStep-1)})),\n      stepNext: ()=>{ if(s.connectStep>=3){ this.setState({connectOpen:false, view:'monitoring'}); } else { this.setState(st=>({connectStep:st.connectStep+1})); } },\n    };\n  }\n\n  countCss(active){\n    return active\n      ? \"background:#dbeafe;color:#2673fd;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600\"\n      : \"background:#f1f5f9;color:#94a3b8;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600\";\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u0
