  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-items:center;gap:7px;background:#2673fd;color:#fff;border:none;border-radius:8px;padding:10px 15px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;box-shadow:0 1px 2px rgba(28,43,64,.12)\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n                Create deployment\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- section tabs -->\n          <div style=\"display:flex;gap:4px;border-bottom:1px solid #e2e8f0;margin:20px 0 0\">\n            <sc-for list=\"{{ sectionTabs }}\" as=\"tab\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ tab.on }}\" style=\"{{ tab.style }}\">\n                <span style=\"display:inline-flex;align-items:center;gap:7px\">{{ tab.label }}<span style=\"{{ tab.countStyle }}\">{{ tab.count }}<\u002Fspan><\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- toolbar -->\n          <div style=\"display:flex;align-items:center;gap:10px;margin:18px 0 14px\">\n            <div style=\"flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;max-width:300px\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n              <span style=\"color:#94a3b8;font-size:13px\">{{ searchPlaceholder }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;color:#64748b;cursor:pointer\">\n              <svg width=\"15\" height=\"15\" viewBox= yle=\"width:7px;height:7px;border-radius:50%;background:{{ m.statusFg }}\"><\u002Fspan>{{ m.status }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"text-align:right\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:14px 2px 0;font-size:12px;color:#94a3b8\">Monitors attach to a deployment. LLM monitors route traffic through a <span style=\"color:#ea7317;font-weight:500\">Judge<\u002Fspan> deployment for scoring; Classic ML monitors compare live data against a reference window.<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- ===== DASHBOARD ===== -->\n        <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:#64748b;margin-bottom:12px\">\n            <span onclick=\"{{ goMonitoring }}\" style=\"cursor:pointer\">Monitoring<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#cbd5e1\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"color:#334155;font-weight:500\">{{ mon.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:11px\">\n                <h1 style=\"margin:0;font-size:23px;font-weight:600;letter-spacing:-0.02em;color:#1e293b\">{{ mon.name }}<\u002Fh1>\n                <span style=\"display:inline-flex;align-items:center;gap:5px;background:{{ mon.typeBg }};color:{{ mon.typeFg }};border-radius:6px;padding:3px 9px;font-size:12px;font-weight:600\">{{ mon.typeIcon }} {{ mon.typeText }}<\u0 \u002Fpath><\u002Fsvg>\n                <span style=\"color:#94a3b8;font-size:13px\">Search trace<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <sc-for list=\"{{ traceTools }}\" as=\"b\" hint-placeholder-count=\"3\">\n                <button style=\"display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:500;color:#475569;font-family:inherit;cursor:pointer\" style-hover=\"background:#f8fafc\">\n                  <sc-if value=\"{{ b.isFilter }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M3 4h18l-7 8v6l-4 2v-8z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ b.isCols }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M9 3v18M15 3v18\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ b.isExport }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M12 3v12M7 10l5 5 5-5M5 21h14\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  {{ b.label }}\n                  <sc-if value=\"{{ b.isFilter }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2.4\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow-x:auto\">\n              <sc-for list=\"{{ traces }}\" as=\"t\" hint-placeholder-count=\"7\">\n                    <\u002Fsc-for><table style=\"border-collapse:collapse;width:100%;min-width:1180px;font-size:13px\">\n                <thead>\n                  <tr>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0;vertical-align:middle;white-space:nowrap\">ID<\u002Fth>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0;white-space:nowrap\">execution time<\u002Fth>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0\">state<\u002Fth>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0\">spans<\u002Fth>\n                    <th colspan=\"2\" style=\"text-align:left;padding:9px 16px;font-weight:600;color:#334155;border-bottom:1px solid #f1f5f9;border-left:1px dashed #e2e8f0;background:#f8fafc\">\n                      <span style=\"display:inline-flex;align-items:center;gap:7px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"1.9\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 14l3-3 3 2 4-5\"><\u002Fpath><\u002Fsvg>scores<\u002Fspan>\n                    <\u002Fth>\n                    <th colspan=\"2\" style=\"text-align:left;padding:9px 16px;font-weight:600;color:#334155;border-bottom:1px solid #f1f5f9;border-left:1px dashed #e2e8f0;background:#f8fafc\">\n                      <span style=\"display:inline-flex;align-items:center;gap:7px;justify-content:space-between;width:100%\"><span style=\"display:inline-flex;align-items:center;gap:7px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"1.9\"><path d=\"M7 10v12M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88z\"><\u002Fpath><\u002Fsvg>feedback (2)<\u002Fspan><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2.4\"><path d=\"M18 15l-6-6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                    <\u002Fth>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0;border-left:1px dashed #e2e8f0;white-space:nowrap\">cost<\u002Fth>\n                    <th rowspan=\"2\" style=\"text-align:left;padding:12px 16px;font-weight:600;color:#334155;border-bottom:1px solid #e2e8f0;border-left:1px dashed #e2e8f0;white-space:nowrap\">creation time<\u002Fth>\n                  <\u002Ftr>\n                  <tr>\n                    <th style=\"text-align:left;padding:8px 16px;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0;border-left:1px dashed #e2e8f0;white-space:nowrap\">helpfulness<\u002Fth>\n                    <th style=\"text-align:left;padding:8px 16px;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0;white-space:nowrap\">hallucination<\u002Fth>\n                    <th style=\"padding:7px 16px;border-bottom:1px solid #e2e8f0;border-left:1px dashed #e2e8f0;vertical-align:bottom\">\n                      <div style=\"font-weight:600;color:#475569;margin-bottom:5px\">👍 user<\u002Fdiv>\n                      <div style=\"display:flex;height:5px;border-radius:3px;overflow:hidden;background:#f1f5f9;width:96px\"><div style=\"background:#22c55e;width:{{ fbUserDist.trueW }}\"><\u002Fdiv><div style=\"background:#ef4444;width:{{ fbUserDist.falseW }}\"><\u002Fdiv><\u002Fdiv>\n                      <div style=\"font-size:10.5px;color:#94a3b8;margin-top:4px;font-family:'Spline Sans Mono',monospace\">True {{ fbUserDist.truePct }}<\u002Fdiv>\n                    <\u002Fth>\n                    <th style=\"padding:7px 16px;border-bottom:1px solid #e2e8f0;vertical-align:bottom\">\n                      <div style=\"font-weight:600;color:#475569;margin-bottom:5px\">✓ accuracy<\u002Fdiv>\n                      <div style=\"display:flex;height:5px;border-radius:3px;overflow:hidden;background:#f1f5f9;width:96px\"><div style=\"background:#22c55e;width:{{ fbAccDist.trueW }}\"><\u002Fdiv><div style=\"background:#ef4444;width:{{ fbAccDist.falseW }}\"><\u002Fdiv><\u002Fdiv>\n                      <div style=\"font-size:10.5px;color:#94a3b8;margin-top:4px;font-family:'Spline Sans Mono',monospace\">True {{ fbAccDist.truePct }}<\u002Fdiv>\n                    <\u002Fth>\n                  <\u002Ftr>\n                <\u002Fthead>\n                <tbody>\n                  <tr onclick=\"{{ t.open }}\" style=\"cursor:pointer;background:{{ t.rowBg }}\" style-hover=\"background:#f5f8ff\">\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;color:#334155;font-weight:500;font-family:'Spline Sans Mono',monospace;white-space:nowrap\">{{ t.id }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;color:#475569;font-family:'Spline Sans Mono',monospace\">{{ t.exec }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9\"><span style=\"display:inline-flex;align-items:center;gap:5px;background:{{ t.stateBg }};color:{{ t.stateFg }};border-radius:5px;padding:2px 9px;font-size:12px;font-weight:600\">{{ t.stateText }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;color:#475569;font-family:'Spline Sans Mono',monospace\">{{ t.spans }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;border-left:1px dashed #f1f5f9;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ t.helpfulFg }}\">{{ t.helpful }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ t.hallucFg }}\">{{ t.halluc }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;border-left:1px dashed #f1f5f9\"><span style=\"display:inline-flex;align-items:center;gap:5px;background:{{ t.fbUser.bg }};color:{{ t.fbUser.fg }};border-radius:5px;padding:2px 8px;font-size:12px;font-weight:500\">{{ t.fbUser.ic }} {{ t.fbUser.txt }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9\"><span style=\"display:inline-flex;align-items:center;gap:5px;background:{{ t.fbAcc.bg }};color:{{ t.fbAcc.fg }};border-radius:5px;padding:2px 8px;font-size:12px;font-weight:500\">{{ t.fbAcc.ic }} {{ t.fbAcc.txt }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;border-left:1px dashed #f1f5f9;color:#475569;font-family:'Spline Sans Mono',monospace;white-space:nowrap\">{{ t.cost }}<\u002Ftd>\n                      <td style=\"padding:13px 16px;border-bottom:1px solid #f1f5f9;border-left:1px dashed #f1f5f9;color:#64748b;font-family:'Spline Sans Mono',monospace;white-space:nowrap\">{{ t.created }}<\u002Ftd>\n                    <\u002Ftr>\n                  \n                <\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- SCORES -->\n          <sc-if value=\"{{ dashScores }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n              <sc-for list=\"{{ scoreCards }}\" as=\"sc\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\">\n                    <span style=\"font-weight:600;color:#1e293b\">{{ sc.name }}<\u002Fspan>\n                    <span style=\"background:#f1f5f9;color:#64748b;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;font-family:'Spline Sans Mono',monospace\">{{ sc.type }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:#94a3b8;margin-bottom:16px\">{{ sc.source }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:flex-end;gap:7px;height:96px\">\n                    <sc-for list=\"{{ sc.bars }}\" as=\"b\" hint-placeholder-count=\"5\">\n                      <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end\">\n                        <div style=\"width:100%;height:{{ b.h }};background:{{ b.color }};border-radius:3px 3px 0 0\"><\u002Fdiv>\n                        <span style=\"font-size:10px;color:#94a3b8;white-space:nowrap\">{{ b.label }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;font-size:13px\"><span style=\"color:#64748b\">{{ sc.aggLabel }}<\u002Fspan><span style=\"font-weight:600;color:#1e293b;font-family:'Spline Sans Mono',monospace\">{{ sc.aggValue }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- USAGE -->\n          <sc-if value=\"{{ dashUsage }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px\">\n              <sc-for list=\"{{ usageStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:15px 16px\">\n                  <div style=\"font-size:12px;color:#64748b;margin-bottom:9px\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"font-size:22px;font-weight:600;color:#1e293b;letter-spacing:-0.02em\">{{ s.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-weight:600;color:#1e293b\">Token usage<\u002Fspan><span style=\"font-size:12px;color:#94a3b8\">input vs output, last 14 days<\u002Fspan><\u002Fdiv>\n              <div onmouseleave=\"{{ clearHov }}\" style=\"position:relative;display:flex;align-items:flex-end;gap:6px;height:160px\">\n                <sc-for list=\"{{ tokenBars }}\" as=\"b\" hint-placeholder-count=\"14\">\n                  <div onmouseenter=\"{{ b.on }}\" style=\"position:relative;flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;height:100%;cursor:pointer\">\n                    <div style=\"height:{{ b.out }};background:#7b68ee;border-radius:2px 2px 0 0\"><\u002Fdiv>\n                    <div style=\"height:{{ b.in }};background:#c7befb;border-radius:0 0 2px 2px\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ hovTok }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:absolute;left:50%;top:-6px;transform:translate(-50%,-100%);background:#0f172a;color:#fff;border-radius:7px;padding:8px 11px;font-size:11px;white-space:nowrap;pointer-events:none;z-index:5;box-shadow:0 6px 18px rgba(15,23,42,.22)\">\n                    <div style=\"font-weight:600;margin-bottom:3px\">{{ hov.day }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:6px;color:#cbd5e1\"><span style=\"width:8px;height:8px;border-radius:2px;background:#c7befb\"><\u002Fspan>Input <b style=\"color:#fff;font-family:'Spline Sans Mono',monospace;margin-left:auto;padding-left:10px\">{{ hov.inTok }}<\u002Fb><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:6px;color:#cbd5e1;margin-top:2px\"><span style=\"width:8px;height:8px;border-radius:2px;background:#7b68ee\"><\u002Fspan>Output <b style=\"color:#fff;font-family:'Spline Sans Mono',monospace;margin-left:auto;padding-left:10px\">{{ hov.outTok }}<\u002Fb><\u002Fdiv>\n                    <div style=\"border-top:1px solid #334155;margin-top:5px;padding-top:4px;display:flex;gap:10px;color:#cbd5e1\">Total <b style=\"color:#fff;font-family:'Spline Sans Mono',monospace;margin-left:auto\">{{ hov.totTok }}<\u002Fb><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:18px;margin-top:14px;font-size:12px;color:#64748b\">\n                <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#c7befb\"><\u002Fspan>Input tokens<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#7b68ee\"><\u002Fspan>Output tokens<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COST -->\n          <sc-if value=\"{{ dashCost }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-weight:600;color:#1e293b\">Daily cost<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:#1e293b;font-family:'Spline Sans Mono',monospace\">{{ costTotalLabel }}<\u002Fspan><\u002Fdiv>\n                <div onmouseleave=\"{{ clearHov }}\" style=\"position:relative;height:180px\">\n                  <svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%\">\n                    <path d=\"{{ costArea }}\" fill=\"rgba(38,115,253,.08)\"><\u002Fpath>\n                    <polyline points=\"{{ costLinePts }}\" fill=\"none\" stroke=\"#2673fd\" stroke-width=\"2.2\" vector-effect=\"non-scaling-stroke\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                  <\u002Fsvg>\n                  <sc-for list=\"{{ costDots }}\" as=\"d\" hint-placeholder-count=\"14\">\n                    <div style=\"position:absolute;left:{{ d.left }};top:{{ d.labelTop }};transform:translate(-50%,-100%);font-size:10px;color:#64748b;font-family:'Spline Sans Mono',monospace;pointer-events:none;white-space:nowrap\">{{ d.label }}<\u002Fdiv>\n                    <div onmouseenter=\"{{ d.on }}\" style=\"position:absolute;left:{{ d.left }};top:{{ d.top }};width:18px;height:18px;transform:translate(-50%,-50%);cursor:pointer;display:flex;align-items:center;justify-content:center\">\n                      <span style=\"width:7px;height:7px;border-radius:50%;background:#fff;border:2px solid #2673fd\"><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <sc-if value=\"{{ hovCost }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"position:absolute;left:{{ hov.left }};top:{{ hov.top }};transform:translate(-50%,-128%);background:#0f172a;color:#fff;border-radius:7px;padding:7px 10px;font-size:11px;white-space:nowrap;pointer-events:none;z-index:5;box-shadow:0 6px 18px rgba(15,23,42,.22)\">\n                      <div style=\"font-weight:600\">{{ hov.title }}<\u002Fdiv>\n                      <div style=\"color:#94a3b8;margin-top:1px\">{{ hov.sub }}<\u002Fdiv>\n                      <div style=\"font-family:'Spline Sans Mono',monospace;font-weight:600;margin-top:1px\">{{ hov.value }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"margin-bottom:16px;font-weight:600;color:#1e293b\">Top users by cost<\u002Fdiv>\n                <sc-for list=\"{{ costByUser }}\" as=\"u\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f1f5f9\">\n                    <div style=\"width:28px;height:28px;border-radius:50%;background:{{ u.color }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none\">{{ u.initials }}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-size:13px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ u.user }}<\u002Fdiv><div style=\"font-size:11px;color:#94a3b8;font-family:'Spline Sans Mono',monospace\">{{ u.reqs }} traces<\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:600;color:#1e293b;font-family:'Spline Sans Mono',monospace\">{{ u.cost }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- DRIFT OVERVIEW (classic) -->\n          <sc-if value=\"{{ driftOverview }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px\">\n              <sc-for list=\"{{ driftStats }}\" as=\"s\" hint-placeholder-count=\"5\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:15px 16px\">\n                  <div style=\"font-size:12px;color:#64748b;margin-bottom:9px\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"font-size:23px;font-weight:600;color:#1e293b;letter-spacing:-0.02em\">{{ s.value }}<\u002Fdiv>\n                  <div style=\"margin-top:7px;font-size:12px;font-weight:500;color:{{ s.deltaFg }}\">{{ s.delta }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-weight:600;color:#1e293b\">Max feature PSI over time<\u002Fspan><span style=\"font-size:12px;color:#94a3b8\">threshold 0.20 · last 14 days<\u002Fspan><\u002Fdiv>\n                <svg viewBox=\"0 0 320 120\" preserveAspectRatio=\"none\" style=\"width:100%;height:130px;overflow:visible\">\n                  <line x1=\"0\" y1=\"{{ psiThreshY }}\" x2=\"320\" y2=\"{{ psiThreshY }}\" stroke=\"#ef4444\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"><\u002Fline>\n                  <path d=\"{{ psiArea }}\" fill=\"rgba(234,115,23,.1)\"><\u002Fpath>\n                  <polyline points=\"{{ psiLine }}\" fill=\"none\" stroke=\"#ea7317\" stroke-width=\"2.4\"><\u002Fpolyline>\n                <\u002Fsvg>\n                <div style=\"display:flex;gap:18px;margin-top:12px;font-size:12px;color:#64748b\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:14px;height:2.5px;background:#ea7317;border-radius:2px\"><\u002Fspan>Max feature PSI<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:14px;height:2px;background:#ef4444;border-radius:2px\"><\u002Fspan>Drift threshold 0.20<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px;display:flex;flex-direction:column\">\n                <div style=\"margin-bottom:14px;font-weight:60 status }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:14px;margin-top:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\"><span style=\"font-weight:600;color:#1e293b\">Multivariate drift (PCA)<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:5px;background:#fef9c3;color:#a16207;border-radius:5px;padding:3px 9px;font-size:12px;font-weight:500\">Watch<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px;color:#94a3b8;margin-bottom:14px\">PC1 × PC2 projection · reference vs logged, computed from the training PCA profile<\u002Fdiv>\n                <svg viewBox=\"0 0 320 190\" style=\"width:100%;height:200px\">\n                  <line x1=\"20\" y1=\"95\" x2=\"312\" y2=\"95\" stroke=\"#f1f5f9\" stroke-width=\"1\"><\u002Fline>\n                  <line x1=\"160\" y1=\"10\" x2=\"160\" y2=\"180\" stroke=\"#f1f5f9\" stroke-width=\"1\"><\u002Fline>\n                  <ellipse cx=\"160\" cy=\"95\" rx=\"62\" ry=\"46\" fill=\"rgba(148,163,184,.10)\" stroke=\"#cbd5e1\" stroke-width=\"1.2\" stroke-dasharray=\"4 3\"><\u002Fellipse>\n                  <ellipse cx=\"230\" cy=\"62\" rx=\"58\" ry=\"44\" fill=\"rgba(234,115,23,.08)\" stroke=\"#ea7317\" stroke-width=\"1.2\" stroke-dasharray=\"4 3\"><\u002Fellipse>\n                  <sc-for list=\"{{ pcaRef }}\" as=\"p\" hint-placeholder-count=\"12\"><circle cx=\"{{ p.cx }}\" cy=\"{{ p.cy }}\" r=\"3\" fill=\"#94a3b8\" fill-opacity=\"0.7\"><\u002Fcircle><\u002Fsc-for>\n                  <sc-for list=\"{{ pcaCur }}\" as=\"p\" hint-placeholder-count=\"12\"><circle cx=\"{{ p.cx }}\" cy=\"{{ p.cy }}\" r=\"3.2\" fill=\"#ea7317\"><\u002Fcircle><\u002Fsc-for>\n                <\u002Fsvg>\n      <\u002Fsvg>\n                <div style=\"display:flex;gap:18px;margin-top:14px;font-size:12px;color:#64748b\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:14px;height:2.5px;background:#2673fd;border-radius:2px\"><\u002Fspan>Feature PSI<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:14px;border-top:2px dashed #ef4444\"><\u002Fspan>Threshold 0.20<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- stats comparison -->\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 10px 10px;overflow:hidden\">\n              <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;padding:11px 18px;border-bottom:1px solid #f1f5f9;background:#f8fafc;font-size:12px;font-weight:600;color:#64748b\">\n                <div>Statistic<\u002Fdiv><div>Reference<\u002Fdiv><div>Current<\u002Fdiv><div>Δ<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ statRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;padding:11px 18px;border-bottom:1px solid #f1f5f9;font-size:13px;align-items:center\">\n                  <div style=\"color:#475569\">{{ r.label }}<\u002Fdiv>\n                  <div style=\"color:#94a3b8;font-family:'Spline Sans Mono',monospace\">{{ r.ref }}<\u002Fdiv>\n                  <div style=\"color:#1e293b;font-weight:500;font-family:'Spline Sans Mono',monospace\">{{ r.cur }}<\u002Fdiv>\n                  <div style=\"color:{{ r.deltaFg }};font-family:'Spline Sans Mono',monospace\">{{ r.delta }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- PREDICTIONS (classic) -->\n          <sc-if value=\"{{ driftPredictions }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px\">\n              <sc-for list=\"{{ predStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:15px 16px\">\n                  <div style=\"font-size:12px;color:#64748b;margin-bottom:9px\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"font-size:22px;font-weight:600;color:#1e293b;letter-spacing:-0.02em\">{{ s.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"margin-bottom:18px;font-weight:600;color:#1e293b\">Prediction distribution<\u002Fdiv>\n                <div style=\"display:flex;align-items:flex-end;gap:14px;height:120px\">\n                  <sc-for list=\"{{ predDist }}\" as=\"b\" hint-placeholder-count=\"5\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end\">\n                      <div style=\"width:100%;display:flex;align-items:flex-end;gap:3px;height:100%\">\n                        <div style=\"flex:1;height:{{ b.ref }};background:#cbd5e1;border-radius:2px 2px 0 0\"><\u002Fdiv>\n                        <div style=\"flex:1;height:{{ b.cur }};background:#2673fd;border-radius:2px 2px 0 0\"><\u002Fdiv>\n                      <\u002Fdiv>\n                      <span style=\"font-size:10px;color:#94a3b8;white-space:nowrap\">{{ b.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:18px;margin-top:14px;font-size:12px;color:#64748b\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#cbd5e1\"><\u002Fspan>Reference<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#2673fd\"><\u002Fspan>Current<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-weight:600;color:#1e293b\">Prediction PSI over time<\u002Fspan><span style=\"font-size:12px;color:#94a3b8\">last 14 days<\u002Fspan><\u002Fdiv>\n                <svg viewBox=\"0 0 320 90\" preserveAspectRatio=\"none\" style=\"width:100%;height:110px\">\n                  <path d=\"{{ predPsiArea }}\" fill=\"rgba(38,115,253,.08)\"><\u002Fpath>\n                  <polyline points=\"{{ predPsiLine }}\" fill=\"none\" stroke=\"#2673fd\" stroke-width=\"2.4\"><\u002Fpolyline>\n                <\u002Fsvg>\n                <div style=\"margin-top:12px;font-size:12px;color:#64748b\">Current <b style=\"color:#334155;font-family:'Spline Sans Mono',monospace\">PSI 0.12<\u002Fb> · below drift threshold 0.20<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- DATA QUALITY (classic) -->\n          <sc-if value=\"{{ driftQuality }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px\">\n              <sc-for list=\"{{ qualityStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:15px 16px\">\n                  <div style=\"font-size:12px;color:#64748b;margin-bottom:9px\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"font-size:22px;font-weight:600;color:#1e293b;letter-spacing:-0.02em\">{{ s.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:17px 18px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><span style=\"font-weight:600;color:#1e293b\">Inference volume<\u002Fspan><span style=\"font-size:12px;color:#94a3b8\">rows / day, last 14 days<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:flex-end;gap:6px;height:150px\">\n                  <sc-for list=\"{{ qualBars }}\" as=\"b\" hint-placeholder-count=\"14\">\n                    <div style=\"flex:1;height:{{ b.h }};background:linear-gradient(#0369a1,#38bdf8);border-radius:3px 3px 0 0\"><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:6px 18px\">\n                <sc-for list=\"{{ qualityChecks }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f1f5f9\">\n                    <div style=\"max-width:62%\"><div style=\"font-size:13px;font-weight:500;color:#1e293b\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px;color:#94a3b8;margin-top:3px\">{{ c.hint }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"display:inline-flex;align-items:center;gap:5px;background:{{ c.badgeBg }};color:{{ c.badgeFg }};border-radius:5px;padding:3px 9px;font-size:12px;font-weight:500\">{{ c.status }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- REFERENCE-PROFILE DRAWER (classic) -->\n          <sc-if value=\"{{ infoOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ closeInfo }}\" style=\"position:fixed;inset:0;background:rgba(15,23,42,.34);z-index:50;animation:lumlFade .14s ease\"><\u002Fdiv>\n            <div style=\"position:fixed;top:0;right:0;bottom:0;width:432px;background:#fff;z-index:51;box-shadow:-12px 0 40px rgba(15,23,42,.16);display:flex;flex-direction:column;animation:lumlPop .18s ease\">\n              <div style=\"padding:20px 22px;border-bottom:1px solid #f1f5f9\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">\n                  <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2673fd\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>Reference profile\n                  <\u002Fspan>\n                  <button onclick=\"{{ closeInfo }}\" style=\"background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;display:flex\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <h3 style=\"margin:0;font-size:19px;font-weight:600;color:#1e293b;font-family:'Spline Sans Mono',monospace\">{{ fSel.name }}<\u002Fh3>\n                  <span style=\"background:#f1f5f9;color:#64748b;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;font-family:'Spline Sans Mono',monospace\">{{ fSel.dtype }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:7px;font-size:12.5px;color:#94a3b8\">Computed at training · baseline <span style=\"color:#2673fd;font-family:'Spline Sans Mono',monospace\">train_baseline_v2<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;overflow-y:auto;padding:20px 22px\">\n                <div style=\"font-size:12px;font-weight:600;color:#64748b;margin-bottom:10px\">Summary statistics<\u002Fdiv>\n                <div style=\"border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;margin-bottom:22px\">\n                  <sc-for list=\"{{ infoRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f1f5f9\">\n                      <span style=\"font-size:13px;color:#475569\">{{ r.k }}<\u002Fspan>\n                      <span style=\"font-size:13px;color:#1e293b;font-weight:500;font-family:'Spline Sans Mono',monospace\">{{ r.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ fSel.isNumeric }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"font-size:12px;font-weight:600;color:#64748b;margin-bottom:10px\">Histogram bin edges<\u002Fdiv>\n                  <div style=\"background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:12px 14px;font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:#334155;margin-bottom:22px\">{{ fSel.edges }}<\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ fSel.isCategorical }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"font-size:12px;font-weight:600;color:#64748b;margin-bottom:10px\">Reference category probabilities<\u002Fdiv>\n                  <div style=\"margin-bottom:22px\">\n                    <sc-for list=\"{{ infoCats }}\" as=\"c\" hint-placeholder-count=\"4\">\n                      <div style=\"margin-bottom:11px\">\n                        <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px\"><span style=\"color:#475569;font-family:'Spline Sans Mono',monospace\">{{ c.name }}<\u002Fspan><span style=\"color:#1e293b;font-weight:500;font-family:'Spline Sans Mono',monospace\">{{ c.p }}<\u002Fspan><\u002Fdiv>\n                        <div style=\"height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden\"><div style=\"height:100%;width:{{ c.p }};background:#2673fd;border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"background:#eff6ff;border:1px solid #dbeafe;border-radius:9px;padding:13px 15px;font-size:12.5px;color:#1e40af;line-height:1.55\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2673fd\" stroke-width=\"2\" style=\"vertical-align:-2px;margin-right:5px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n                  This profile is the training baseline. Each logged production batch is binned with these edges and compared against the reference probabilities to compute the feature's PSI drift score.\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- ===== SINGLE TRACE ===== -->\n        <sc-if value=\"{{ isTrace }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:#64748b;margin-bottom:12px\">\n            <span onclick=\"{{ goMonitoring }}\" style=\"cursor:pointer\">Monitoring<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#cbd5e1\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n            <span onclick=\"{{ backToDash }}\" style=\"cursor:pointer\">{{ mon.name }}<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#cbd5e1\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"color:#334155;font-weight:500;font-family:'Spline Sans Mono',monospace\">{{ trace.id }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n            <h1 style=\"margin:0;font-size:21px;font-weight:600;letter-spacing:-0.02em;color:#1e293b\">{{ trace.name }}<\u002Fh1>\n            <div style=\"display:flex;gap:18px;font-size:13px;color:#64748b\">\n              <span>Latency <b style=\"color:#334155;font-family:'Spline Sans Mono',monospace\">{{ trace.latency }}<\u002Fb><\u002Fspan>\n              <span>Cost <b style=\"color:#334155;font-family:'Spline Sans Mono',monospace\">{{ trace.cost }}<\u002Fb><\u002Fspan>\n              <span>Tokens <b style=\"color:#334155;font-family:'Spline Sans Mono',monospace\">{{ trace.tokens }}<\u002Fb><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start\">\n            <!-- span tree -->\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;padding:4px 8px 10px\">Observation tree<\u002Fdiv>\n              <sc-for list=\"{{ spans }}\" as=\"sp\" hint-placeholder-count=\"5\">\n                <div onclick=\"{{ sp.on }}\" style=\"display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;margin-bottom:2px;background:{{ sp.bg }};padding-left:{{ sp.indent }}\">\n                  <span style=\"width:20px;height:20px;border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;background:{{ sp.iconBg }};color:{{ sp.iconFg }}\">{{ sp.icon }}<\u002Fspan>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font-size:13px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:{{ sp.weight }}\">{{ sp.name }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:11px;color:#94a3b8;font-family:'Spline Sans Mono',monospace\">{{ sp.dur }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- span detail -->\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden\">\n                <div style=\"display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #f1f5f9\">\n                  <span style=\"font-weight:600;color:#1e293b\">{{ span.name }}<\u002Fspan>\n                  <span style=\"background:{{ span.kindBg }};color:{{ span.kindFg }};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600\">{{ span.kind }}<\u002Fspan>\n                  <sc-if value=\"{{ span.model }}\" hint-placeholder-val=\"model\">\n                    <span style=\"font-size:12px;color:#64748b;font-family:'Spline Sans Mono',monospace\">{{ span.model }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid #f1f5f9\">\n                  <sc-for list=\"{{ spanTabs }}\" as=\"tab\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ tab.on }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"padding:16px 18px\">\n                  <sc-if value=\"{{ spanIO }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px\">Input<\u002Fdiv>\n                    <pre style=\"margin:0 0 16px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:13px 15px;font-family:'Spline Sans Mono',monospace;font-size:12.5px;line-height:1.6;color:#334155;white-space:pre-wrap;overflow-x:auto\">{{ span.input }}<\u002Fpre>\n                    <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px\">Output<\u002Fdiv>\n                    <pre style=\"margin:0;background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:13px 15px;font-family:'Spline Sans Mono',monospace;font-size:12.5px;line-height:1.6;color:#334155;white-space:pre-wrap;overflow-x:auto\">{{ span.output }}<\u002Fpre>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ spanScores }}\" hint-placeholder-val=\"{{ true }}\">\n                    <sc-for list=\"{{ span.scoreRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f1f5f9\">\n                        <div><div style=\"font-size:13px;color:#334155;font-weight:500\">{{ r.name }}<\u002Fdiv><div style=\"font-size:11px;color:#94a3b8\">{{ r.source }}<\u002Fdiv><\u002Fdiv>\n                        <span style=\"background:{{ r.bg }};color:{{ r.fg }};border-radius:6px;padding:4px 11px;font-size:13px;font-weight:600;font-family:'Spline Sans Mono',monospace\">{{ r.value }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ spanMeta }}\" hint-placeholder-val=\"{{ true }}\">\n                    <sc-for list=\"{{ span.metaRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                      <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:13px\"><span style=\"color:#64748b\">{{ r.k }}<\u002Fspan><span style=\"color:#334155;font-family:'Spline Sans Mono',monospace\">{{ r.v }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== CONFIG ===== -->\n        <sc-if value=\"{{ isConfig }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:7px;font-size:13px;color:#64748b;margin-bottom:12px\">\n            <span onclick=\"{{ goMonitoring }}\" style=\"cursor:pointer\">Monitoring<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#cbd5e1\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n            <span onclick=\"{{ backToDash }}\" style=\"cursor:pointer\">{{ mon.name }}<\u002Fspan>\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#cbd5e1\" stroke-width=\"2.2\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n            <span style=\"color:#334155;font-weight:500\">Configure<\u002Fspan>\n          <\u002Fdiv>\n          <h1 style=\"margin:0 0 4px;font-size:21px;font-weight:600;letter-spacing:-0.02em;color:#1e293b\">Configure monitor<\u002Fh1>\n          <p style=\"margin:0 0 18px;color:#64748b;font-size:13px\">{{ mon.name }} — {{ mon.typeText }}<\u002Fp>\n          <div style=\"display:flex;gap:4px;border-bottom:1px solid #e2e8f0;margin-bottom:22px\">\n            <sc-for list=\"{{ configTabs }}\" as=\"tab\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ tab.on }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- LLM scorers -->\n          <sc-if value=\"{{ cfgScorers }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n              <div><div style=\"font-weight:600;color:#1e293b\">Scorers<\u002Fdiv><div style=\"font-size:12px;color:#64748b;margin-top:3px\">Each scorer writes a Score onto every trace. LLM-as-judge runs on the Judge deployment; custom scorers run a Python function on the trace output.<\u002Fdiv><\u002Fdiv>\n              <button style=\"flex:none;display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:500;color:#334155;font-family:inherit;cursor:pointer\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Add scorer<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <sc-for list=\"{{ scorers }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px\">\n                  <div style=\"display:flex;align-items:center;gap:10px\">\n                    <span style=\"width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:{{ s.iconBg }};color:{{ s.iconFg }};font-size:14px\">{{ s.icon }}<\u002Fspan>\n                    <div style=\"flex:1\">\n                      <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-weight:600;color:#1e293b\">{{ s.name }}<\u002Fspan><span style=\"background:{{ s.kindBg }};color:{{ s.kindFg }};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600\">{{ s.kind }}<\u002Fspan><span style=\"background:#f1f5f9;color:#64748b;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;font-family:'Spline Sans Mono',monospace\">{{ s.scoreType }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"font-size:12px;color:#64748b;margin-top:4px\">{{ s.desc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <label style=\"position:relative;width:38px;height:22px;flex:none\"><span style=\"position:absolute;inset:0;background:{{ s.toggleBg }};border-radius:11px;transition:.2s\"><\u002Fspan><span style=\"position:absolute;top:3px;left:{{ s.toggleX }};width:16px;height:16px;background:#fff;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.2s\"><\u002Fspan><\u002Flabel>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ s.hasCode }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"margin-top:14px;border:1px solid #e2e8f0;border-radius:9px;overflow:hidden\">\n                      <div style=\"display:flex;align-items:center;justify-content:space-between;background:#1e293b;padding:8px 13px\">\n                        <span style=\"font-size:12px;color:#cbd5e1;font-family:'Spline Sans Mono',monospace\">{{ s.fileName }}<\u002Fspan>\n                        <span style=\"font-size:11px;color:#64748b\">Python · runs in Satellite sandbox<\u002Fspan>\n                      <\u002Fdiv>\n                      <pre style=\"margin:0;background:#0f172a;color:#e2e8f0;padding:14px 16px;font-family:'Spline Sans Mono',monospace;font-size:12.5px;line-height:1.7;overflow-x:auto;white-space:pre\">{{ s.code }}<\u002Fpre>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ s.hasPrompt }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"margin-top:14px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:9px;padding:13px 15px\">\n                      <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:7px\">Judge prompt<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#334155;line-height:1.6;font-family:'Spline Sans Mono',monospace\">{{ s.prompt }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Prompt management -->\n          <sc-if value=\"{{ cfgPrompt }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #f1f5f9\">\n                <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-weight:600;color:#1e293b\">judge_helpfulness<\u002Fspan><span style=\"background:#dcfce7;color:#16a34a;border-radius:5px;padding:2px 9px;font-size:11px;font-weight:600\">production · v3<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:8px\">\n                  <button style=\"background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:500;color:#334155;font-family:inherit;cursor:pointer\">Version history<\u002Fbutton>\n                  <button style=\"background:#2673fd;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:500;color:#fff;font-family:inherit;cursor:pointer\">Save new version<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:18px\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px\">Template<\u002Fdiv>\n                <pre style=\"margin:0;background:#f8fafc;border:1px solid #f1f5f9;border-radius:9px;padding:15px 16px;font-family:'Spline Sans Mono',monospace;font-size:13px;line-height:1.7;color:#334155;white-space:pre-wrap\">{{ promptText }}<\u002Fpre>\n                <div style=\"display:flex;gap:20px;margin-top:16px;font-size:13px;color:#64748b\">\n                  <span>Model <b style=\"color:#334155\">gpt-judge-v2<\u002Fb><\u002Fspan>\n                  <span>Temperature <b style=\"color:#334155\">0.0<\u002Fb><\u002Fspan>\n                  <span>Variables <b style=\"color:#2673fd;font-family:'Spline Sans Mono',monospace\">{{input}} {{output}}<\u002Fb><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- General / classic config -->\n          <sc-if value=\"{{ cfgGeneral }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:6px 18px\">\n              <sc-for list=\"{{ generalRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #f1f5f9\">\n                  <div style=\"max-width:55%\"><div style=\"font-size:14px;font-weight:500;color:#1e293b\">{{ r.k }}<\u002Fdiv><div style=\"font-size:12px;color:#94a3b8;margin-top:3px\">{{ r.hint }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:13px;color:#334155;font-family:'Spline Sans Mono',monospace;text-align:right\">{{ r.v }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ============ CONNECT MODAL ============ -->\n  <sc-if value=\"{{ connectOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeConnect }}\" style=\"position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:50;animation:lumlFade .15s ease\">\n      <div onclick=\"{{ stop }}\" style=\"width:760px;max-width:94vw;max-height:90vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(15,23,42,.3);animation:lumlPop .2s ease;display:flex;flex-direction:column\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f1f5f9\">\n          <div><div style=\"font-size:17px;font-weight:600;color:#1e293b\">Connect monitoring<\u002Fdiv><div style=\"font-size:13px;color:#64748b;margin-top:2px\">Attach a monitor to a deployment<\u002Fdiv><\u002Fdiv>\n          <button onclick=\"{{ closeConnect }}\" style=\"width:32px;height:32px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;font-size:15px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex:1;min-height:0\">\n          <!-- stepper -->\n          <div style=\"width:210px;flex:none;background:#f8fafc;border-right:1px solid #f1f5f9;padding:20px 18px;display:flex;flex-direction:column;gap:4px\">\n            <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:8px;background:{{ st.bg }}\">\n                <span style=\"width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:{{ st.numBg }};color:{{ st.numFg }}\">{{ st.num }}<\u002Fspan>\n                <span style=\"font-size:13px;color:{{ st.fg }};font-weight:{{ st.weight }}\">{{ st.label }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- step body -->\n          <div style=\"flex:1;padding:24px;min-width:0\">\n            <!-- step 1: target + type -->\n            <sc-if value=\"{{ step1 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:9px\">Deployment to monitor<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;border-radius:9px;padding:12px 14px;margin-bottom:22px\">\n                <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:30px;height:30px;border-radius:7px;background:#eff6ff;color:#2673fd;display:flex;align-items:center;justify-content:center\">⊞<\u002Fspan><div><div style=\"font-size:13px;font-weight:500;color:#1e293b\">customer_support_llm<\u002Fdiv><div style=\"font-size:11px;color:#94a3b8;font-family:'Spline Sans Mono',monospace\">id: 019c…91f2<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2.2\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:9px\">Monitoring type<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n                <div onclick=\"{{ pickLLM }}\" style=\"border:2px solid {{ llmCardBorder }};background:{{ llmCardBg }};border-radius:11px;padding:16px;cursor:pointer\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\"><span style=\"font-size:22px\">🧠<\u002Fspan><span style=\"width:18px;height:18px;border-radius:50%;border:2px solid {{ llmCardBorder }};display:flex;align-items:center;justify-content:center;background:{{ llmDotBg }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:#fff;opacity:{{ llmDotOp }}\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <div style=\"font-weight:600;color:#1e293b;margin-bottom:4px\">LLM Observability<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#64748b;line-height:1.5\">Traces, token usage, cost and LLM-as-judge scoring. Routes scoring through a Judge deployment.<\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ pickClassic }}\" style=\"border:2px solid {{ classicCardBorder }};background:{{ classicCardBg }};border-radius:11px;padding:16px;cursor:pointer\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\"><span style=\"font-size:22px\">📊<\u002Fspan><span style=\"width:18px;height:18px;border-radius:50%;border:2px solid {{ classicCardBorder }};display:flex;align-items:center;justify-content:center;background:{{ classicDotBg }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:#fff;opacity:{{ classicDotOp }}\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <div style=\"font-weight:600;color:#1e293b;margin-bottom:4px\">Classic ML Drift<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#64748b;line-height:1.5\">Feature &amp; prediction drift vs a reference window (PSI, distributions). Surfaced in the drift dashboard.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <!-- step 2: judge / reference -->\n            <sc-if value=\"{{ step2 }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-if value=\"{{ connectIsLLM }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:5px\">Judge deployment<\u002Fdiv>\n                <div style=\"font-size:12px;color:#64748b;margin-bottom:13px\">Pick a deployment marked as <span style=\"color:#ea7317;font-weight:500\">Judge<\u002Fspan> to run the LLM-as-judge scorers.<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:10px\">\n                  <sc-for list=\"{{ judgeOptions }}\" as=\"j\" hint-placeholder-count=\"2\">\n                    <div onclick=\"{{ j.on }}\" style=\"display:flex;align-items:center;gap:11px;border:2px solid {{ j.border }};background:{{ j.bg }};border-radius:10px;padding:13px 14px;cursor:pointer\">\n                      <span style=\"width:30px;height:30px;border-radius:7px;background:#fff7ed;color:#ea7317;display:flex;align-items:center;justify-content:center;flex:none\">⚖<\u002Fspan>\n                      <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:500;color:#1e293b\">{{ j.name }}<\u002Fdiv><div style=\"font-size:11px;color:#94a3b8;font-family:'Spline Sans Mono',monospace\">{{ j.model }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"width:18px;height:18px;border-radius:50%;border:2px solid {{ j.border }};display:flex;align-items:center;justify-content:center;background:{{ j.dotBg }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:#fff;opacity:{{ j.dotOp }}\"><\u002Fspan><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"margin-top:18px;display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:11px 13px\">💡 No judge yet? <span style=\"color:#2673fd;font-weight:500;cursor:pointer\">Deploy a model as Judge →<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ connectIsClassic }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:13px\">Reference window &amp; drift metrics<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;border-radius:9px;padding:12px 14px\"><span style=\"font-size:13px;color:#334155\">Reference dataset<\u002Fspan><span style=\"font-size:13px;color:#2673fd;font-family:'Spline Sans Mono',monospace\">train_baseline_v2<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;border-radius:9px;padding:12px 14px\"><span style=\"font-size:13px;color:#334155\">Drift metric<\u002Fspan><span style=\"font-size:13px;color:#334155;font-family:'Spline Sans Mono',monospace\">PSI · threshold 0.2<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;border-radius:9px;padding:12px 14px\"><span style=\"font-size:13px;color:#334155\">Window<\u002Fspan><span style=\"font-size:13px;color:#334155;font-family:'Spline Sans Mono',monospace\">rolling 7 days<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n            <!-- step 3: review -->\n            <sc-if value=\"{{ step3 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;margin-bottom:13px\">Review<\u002Fdiv>\n              <div style=\"background:#f8fafc;border:1px solid #f1f5f9;border-radius:10px;padding:6px 16px;margin-bottom:18px\">\n                <sc-for list=\"{{ reviewRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eef2f7;font-size:13px\"><span style=\"color:#64748b\">{{ r.k }}<\u002Fspan><span style=\"color:#334155;font-weight:500\">{{ r.v }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;font-size:13px;color:#16a34a;background:#dcfce7;border-radius:8px;padding:11px 13px\">✓ Monitoring will start ingesting on connect. First traces appear within ~1 min.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- modal footer -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-top:1px solid #f1f5f9\">\n          <button onclick=\"{{ stepBack }}\" style=\"background:#fff;border:1px calEnd:d, calMode:'end' });\n  }\n\n  // ---- palette helpers ----\n  tab(active){\n    return active\n      ? \"background:none;border:none;border-bottom:2px solid #2673fd;color:#2673fd;font-weight:600;font-size:14px;font-family:inherit;padding:10px 14px;margin-bottom:-1px;cursor:pointer\"\n      : \"background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-weight:500;font-size:14px;font-family:inherit;padding:10px 14px;margin-bottom:-1px;cursor:pointer\";\n  }\n  subtab(active){\n    return active\n      ? \"background:#eff6ff;border:none;color:#2673fd;font-weight:600;font-size:13px;font-family:inherit;padding:7px 13px;border-radius:7px;cursor:pointer\"\n      : \"background:none;border:none;color:#64748b;font-weight:500;font-size:13px;font-family:inherit;padding:7px 13px;border-radius:7px;cursor:pointer\";\n  }\n  pill(active){\n    return active\n      ? \"background:#eff6ff;border:none;color:#2673fd;font-weight:600;font-size:12px;font-family:inherit;padding:6px 12px;border-radius:7px;cursor:pointer\"\n      : \"background:none;border:none;color:#64748b;font-weight:500;font-size:12px;font-family:inherit;padding:6px 12px;border-radius:7px;cursor:pointer\";\n  }\n  trng(active){\n    return active\n      ? \"background:#1e293b;border:none;color:#fff;font-weight:500;font-size:12px;font-family:inherit;padding:6px 11px;border-radius:6px;cursor:pointer\"\n      : \"background:none;border:none;color:#64748b;font-weight:500;font-size:12px;font-family:inherit;padding:6px 11px;border-radius:6px;cursor:pointer\";\n  }\n\n  // ---- data ----\n  get monitorsData(){\n    return [\n      { id:'mon_8f21', name:'support-bot · production', type:'LLM', target:'customer_support_llm', judge:'gpt-judge-v2', scorers:'4 active', status:'Active',\n        stats:{ traces:'12,847', avgLat:'1.24s', p95:'3.10s', cost:'$418.20', err:'0.8%' } },\n      { id:'mon_3a07', name:'rag-search · production', type:'LLM', target:'rag_search_api', judge:'llama-eval-8b', scorers: alue\": len(output.split()),\\n        \"data_type\": \"NUMERIC\",\\n    }' },\n      { name:'intent', kind:'Custom Python', scoreType:'CATEGORICAL', icon:'🐍', desc:'Classifies the user message into a support intent. Runs a small local classifier.', on:false, hasCode:true, fileName:'intent_classifier.py',\n        code:'def score(trace):\\n    text = trace.input[\"user\"]\\n    label = classify(text)  # billing|technical|account|other\\n    return {\\n        \"name\": \"intent\",\\n        \"value\": label,\\n        \"data_type\": \"CATEGORICAL\",\\n    }' },\n    ];\n  }\n\n  renderVals(){\n    const s = this.state;\n    const view = s.view;\n    const isList = view==='deployments' || view==='monitoring';\n    const mons = this.monitorsData;\n    const mon = mons[s.selMonitor] || mons[0];\n    const monIsLLM = mon.type==='LLM';\n\n    // ---- monitor row helpers ----\n    const monTypeStyle = (t)=> t==='LLM'\n      ? { bg:'#f3e8ff', fg:'#9333ea', icon:'🧠', text:'LLM Observability' }\n      : { bg:'#e0f2fe', fg:'#0369a1', icon:'📊', text:'Classic ML Drift' };\n\n    const monitors = mons.map((m,i)=>{\n      const t = monTypeStyle(m.type);\n      return { ...m, isLLM:m.type==='LLM', isClassic:m.type==='Classic',\n        typeBg:t.bg, typeFg:t.fg, typeIcon:t.icon, typeText:t.text,\n        statusFg: m.status==='Active' ? '#16a34a' : '#94a3b8',\n        open: ()=> this.setState({ view:'dashboard', dashTab: m.type==='LLM'?'metrics':'drift', selMonitor:i }) };\n    });\n\n    // ---- deployments rows ----\n    const stTag = (st)=> st==='Active' ? {bg:'#dcfce7',fg:'#16a34a'} : st==='Failed' ? {bg:'#fee2e2',fg:'#dc2626'} : {bg:'#fef9c3',fg:'#a16207'};\n    const monTag = (m)=> m==='LLM' ? {bg:'#f3e8ff',fg:'#9333ea',text:'🧠 LLM'} : m==='Classic' ? {bg:'#e0f2fe',fg:'#0369a1',text:'📊 Classic'} : {bg:'#f1f5f9',fg:'#94a3b8',text:'— Not connected'};\n    const deployments = this.deploymentsData.map(d=>{\n      const st = stTag(d.status); const mt = monTag(d.mon);\n      return
