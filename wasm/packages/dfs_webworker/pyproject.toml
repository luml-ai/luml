[build-system]

requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
dependencies = [
]
name = "dfs-webworker"
version = "0.1.0"
authors = [
  { name="Oleh Kostromin", email="oleh@dataforce.solutions1" },
]
description = ""
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

[dependency-groups]
dev = [
    "numpy>=1.26",
    "pandas>=2.0",
    "pytest>=8.0",
    "scikit-learn>=1.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

